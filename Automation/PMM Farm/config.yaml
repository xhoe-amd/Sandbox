# ===========================================
# PMM Server Configuration
# ===========================================
# This file contains all configurable settings for the PMM Server.
# Command-line arguments will override these settings if provided.

# -------------------------------------------
# Program Selection (affects SMT & APEX queues)
# -------------------------------------------
program: "SOUNDWAVE"    # Options: MAGNUS, GAINSBOROUGH, SOUNDWAVE, CANIS

# -------------------------------------------
# Server Settings
# -------------------------------------------
server:
  host: "0.0.0.0"
  port: 5000

# -------------------------------------------
# File Paths (relative to script directory)
# -------------------------------------------
paths:
  feature_yaml: "enable_feature.yaml"
  stations_yaml: "stations.yaml"
  output_dir: "output"

# -------------------------------------------
# Mode Flags
# -------------------------------------------
modes:
  permutation: false      # Enable permutation mode (generate all feature combinations)
  smt_monitor: false      # Enable SMT monitoring for stack releases
  weekly_permutations: false  # Run permutations on weekly stack runs (default: baseline only)

# -------------------------------------------
# Timing Intervals (in seconds)
# -------------------------------------------
intervals:
  yaml_monitor: 30        # How often to check YAML for changes
  smt_check: 3600         # How often to check SMT for new releases (1 hour)

# -------------------------------------------
# SMT (Stack Management Tool) Settings
# -------------------------------------------
smt:
  url: "http://atlstmapp01.amd.com:1234/api/getStacksForTimeline"
  username: ""            # SMT username (NTLM auth)
  password: ""            # SMT password (NTLM auth)

# -------------------------------------------
# APEX Job Scheduler Settings
# -------------------------------------------
apex:
  url: "http://apexlegacy.amd.com/jobs"
  owner: "xhoe@amd.com"
  execution_label: "xhoe_scheduler_testing"
  
  # Queue names per program (selected based on global 'program' setting)
  programs:
    SOUNDWAVE:
      weekly:
        baseline:
          priority: "1"
          setup_queue: "SWV - Weekly Stack Installation"
          test_queue: "SWV - Weekly Baseline Workloads"
        feature:
          priority: "2"
          setup_queue: "SWV - Feature Enablement"
          test_queue: "SWV - Feature Workloads"
      daily:
        baseline:
          priority: "4"
          setup_queue: "SWV - BIOS Reset"
          test_queue: "SWV - Daily Baseline Workloads"
        feature:
          priority: "5"
          setup_queue: "SWV - Feature Enablement"
          test_queue: "SWV - Feature Workloads"
    
    GAINSBOROUGH:
      weekly:
        baseline:
          priority: "1"
          setup_queue: "GBR - Weekly Stack Installation"
          test_queue: "GBR - Weekly Baseline Workloads"
        feature:
          priority: "2"
          setup_queue: "GBR - Feature Enablement"
          test_queue: "GBR - Feature Workloads"
      daily:
        baseline:
          priority: "4"
          setup_queue: "GBR - BIOS Reset"
          test_queue: "GBR - Daily Baseline Workloads"
        feature:
          priority: "5"
          setup_queue: "GBR - Feature Enablement"
          test_queue: "GBR - Feature Workloads"
    
    MAGNUS:
      weekly:
        baseline:
          priority: "1"
          setup_queue: "MGN - Weekly Stack Installation"
          test_queue: "MGN - Weekly Baseline Workloads"
        feature:
          priority: "2"
          setup_queue: "MGN - Feature Enablement"
          test_queue: "MGN - Feature Workloads"
      daily:
        baseline:
          priority: "4"
          setup_queue: "MGN - BIOS Reset"
          test_queue: "MGN - Daily Baseline Workloads"
        feature:
          priority: "5"
          setup_queue: "MGN - Feature Enablement"
          test_queue: "MGN - Feature Workloads"
    
    CANIS:
      weekly:
        baseline:
          priority: "1"
          setup_queue: "CAN - Weekly Stack Installation"
          test_queue: "CAN - Weekly Baseline Workloads"
        feature:
          priority: "2"
          setup_queue: "CAN - Feature Enablement"
          test_queue: "CAN - Feature Workloads"
      daily:
        baseline:
          priority: "4"
          setup_queue: "CAN - BIOS Reset"
          test_queue: "CAN - Daily Baseline Workloads"
        feature:
          priority: "5"
          setup_queue: "CAN - Feature Enablement"
          test_queue: "CAN - Feature Workloads"
